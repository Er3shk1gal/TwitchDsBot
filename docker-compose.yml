# Runs the whole bot in one container (bot + ffmpeg + yt-dlp baked in).
#
#   cp .env.example .env      # then fill in DISCORD__TOKEN (and YOUTUBE__APIKEY if you want the notifier)
#   docker compose up -d      # build image + start
#   docker compose logs -f    # watch it connect
#
# The SQLite database lives in the named volume `bot-data` so it survives restarts/rebuilds.
services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: discord-bot:latest
    container_name: discord-bot
    restart: unless-stopped

    # Discord VOICE uses outbound UDP to dynamically-assigned voice servers. Docker's default bridge
    # network commonly breaks that UDP path, so the bot joins the channel (gateway op) but the voice
    # handshake never completes — /radio play then fails with "couldn't join". Host networking gives
    # the container the host's network so voice UDP works like native. (Linux only; the bot exposes
    # no ports, so this is safe. On Docker Desktop for Mac/Windows host mode behaves differently.)
    network_mode: host

    # Secrets & settings come from .env (DISCORD__TOKEN, YOUTUBE__APIKEY, etc.).
    env_file:
      - .env

    # These take precedence over .env so the DB always lands on the persistent volume and the
    # media tools resolve inside the container regardless of what .env says.
    environment:
      DATABASE__CONNECTIONSTRING: "Data Source=/app/data/bot.db"
      MUSIC__FFMPEGPATH: "ffmpeg"
      MUSIC__YTDLPPATH: "/usr/local/bin/yt-dlp"
      # Uncomment to make YouTube work from a server IP (needs the cookies volume below):
      # MUSIC__COOKIESPATH: "/app/cookies.txt"

    volumes:
      - bot-data:/app/data
      # Put a Netscape cookies.txt next to this file and uncomment to enable YouTube cookies.
      # NOT read-only: yt-dlp writes refreshed cookies back, which keeps them working longer.
      # - ./cookies.txt:/app/cookies.txt

    # Outbound-only bot: no ports to expose.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
